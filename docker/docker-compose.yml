version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - '8000:8000'
    env_file: ../.env

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - '8501:8501'
    env_file: ../.env
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - '5000:5000'
    command: mlflow server --host 0.0.0.0 --port 5000
